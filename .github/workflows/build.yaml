name: macOS tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install minimal test dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install --no-deps -e .
        python -m pip install requests selenium yt-dlp pytest
    - name: CLI help
      run: python -m swinydl.main --help
    - name: Doctor
      run: python -m swinydl.main doctor
    - name: Unit tests
      run: python -m unittest discover -s tests -v
