name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v4.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install xcodegen

      - name: Build unsigned DMG
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: bash scripts/package_release.sh "$RELEASE_VERSION"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SWinyDL-${{ github.event.inputs.version || github.ref_name }}.dmg
          path: dist/*.dmg

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
