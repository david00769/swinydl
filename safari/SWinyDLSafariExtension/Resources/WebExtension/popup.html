<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SWinyDL</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>SWinyDL</h1>
          <p class="subtitle">Safari-first Echo360 selection and launch flow.</p>
        </div>
        <div class="header-actions">
          <button id="open-app" class="secondary">Open App</button>
          <button id="refresh" class="secondary">Reload</button>
        </div>
      </header>

      <section id="status" class="status">Loading course inventory…</section>

      <section id="first-run" class="first-run">
        <h2>First run</h2>
        <p>Run the installer, open the app once, enable the Safari extension, then open Canvas or EchoVideo.</p>
      </section>

      <section id="controls" class="controls hidden">
        <div class="selection-toolbar">
          <span id="selection-count">0 selected</span>
          <div>
            <button id="check-all" class="secondary compact">Check All</button>
            <button id="uncheck-all" class="secondary compact">Uncheck All</button>
          </div>
        </div>
        <label class="setting">
          <input id="delete-downloads" type="checkbox" checked />
          <span>Delete downloaded media after transcription to conserve disk space</span>
        </label>
        <div class="actions">
          <button id="transcribe">Transcribe</button>
          <button id="download-transcribe" class="secondary">Download + Transcribe</button>
        </div>
      </section>

      <section id="course" class="course hidden">
        <h2 id="course-title"></h2>
        <p id="course-meta"></p>
      </section>

      <section id="lesson-list" class="lesson-list"></section>

      <section class="jobs">
        <div class="jobs-header">
          <h2>Recent Jobs</h2>
          <div class="jobs-actions">
            <button id="export-debug" class="secondary">Export Debug Log</button>
            <button id="refresh-jobs" class="secondary">Refresh Jobs</button>
          </div>
        </div>
        <div id="job-list" class="job-list"></div>
      </section>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
  </html>
